# ==============================================================================
# Example: Eye-on-Base Configuration
# ==============================================================================
# Use this configuration when the camera is fixed (e.g., on a tripod or wall).
# The calibration result will be the transform from robot base to camera.
# ==============================================================================

calibration:
  name: "eye_on_base_calibration"
  eye_on_hand: false
  
  # Robot frames
  robot_base_frame: "base_link"
  robot_effector_frame: "tool0"
  
  # Camera frames (fixed position)
  # The marker should be attached to the robot's end-effector
  tracking_base_frame: "camera_color_optical_frame"
  tracking_marker_frame: "aruco_marker"

algorithm:
  name: "Tsai-Lenz"

publisher:
  publish_static_tf: true
  publish_rate: 50.0
