# ==============================================================================
# Example: Eye-in-Hand Configuration
# ==============================================================================
# Use this configuration when the camera is mounted on the robot's end-effector.
# The calibration result will be the transform from end-effector to camera.
# ==============================================================================

calibration:
  name: "eye_in_hand_calibration"
  eye_on_hand: true
  
  # Robot frames
  robot_base_frame: "base_link"
  robot_effector_frame: "tool0"
  
  # Camera frames (mounted on end-effector)
  # The marker should be fixed on the table or workspace
  tracking_base_frame: "camera_color_optical_frame"
  tracking_marker_frame: "aruco_marker"

algorithm:
  name: "Tsai-Lenz"

publisher:
  publish_static_tf: true
  publish_rate: 50.0
