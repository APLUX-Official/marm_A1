# 舵机角度偏差补偿配置文件
# 每个舵机的偏差值（单位：度）会被加到控制角度上
# 例如: 如果舵机实际比命令角度偏大10度，则设置偏差为-10
# 调整后实际角度 = 命令角度 + 偏差值

servo_offsets:
  servo_0: 0.0  # joint1 角度偏差（度）
  servo_1: 1.0  # joint2 角度偏差（度）
  servo_2: 0.0  # joint3 角度偏差（度）
  servo_3: 0.0  # joint4 角度偏差（度）
  servo_4: 0.0  # joint5 角度偏差（度）
  servo_5: 0.0  # joint6 夹爪角度偏差（度）

# 配置说明：
# 1. 正值: 当实际角度需要增加时使用（舵机安装偏小）
# 2. 负值: 当实际角度需要减小时使用（舵机安装偏大）
# 3. 修改后保存文件，重启节点生效
